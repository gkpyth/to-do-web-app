<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<section class="min-vh-100 gradient-custom">
    <div class="container py-5 flex-fill">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col col-xl-10">
                <div class="card mb-4">
                    <div class="card-body p-4">
                        <h1 class="text-center">To Do App</h1>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body p-5">

                        <form action="/add_task" method="POST" class="d-flex justify-content-center align-items-center mb-4">
                            <div class="flex-fill">
                                <input type="text" name="task" id="form2" class="form-control" placeholder="New task..."/>
                            </div>
                            <button type="submit" class="btn btn-dark ms-2">
                                Add
                            </button>
                        </form>

                        <!-- Tabs navs -->
                        <ul class="nav nav-tabs mb-4 pb-2" id="ex1" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="ex1-tab-1" data-bs-toggle="tab"
                                        data-bs-target="#ex1-tabs-1" type="button" role="tab"
                                        aria-controls="ex1-tabs-1" aria-selected="true">All
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="ex1-tab-2" data-bs-toggle="tab"
                                        data-bs-target="#ex1-tabs-2" type="button" role="tab"
                                        aria-controls="ex1-tabs-2" aria-selected="false">Active
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="ex1-tab-3" data-bs-toggle="tab"
                                        data-bs-target="#ex1-tabs-3" type="button" role="tab"
                                        aria-controls="ex1-tabs-3" aria-selected="false">Completed
                                </button>
                            </li>
                        </ul>
                        <!-- Tabs navs -->

                        <!-- Tabs content -->
                        <div class="tab-content" id="ex1-content">
                            <div class="tab-pane fade show active" id="ex1-tabs-1" role="tabpanel"
                                 aria-labelledby="ex1-tab-1">
                                <ul class="list-group mb-0">
                                    {% for task in tasks %}
                                    <li class="list-group-item d-flex align-items-center border-0 mb-2 rounded"
                                        style="background-color: #f4f6f7;">
                                        <input class="form-check-input me-2" type="checkbox" value="" aria-label="Mark task as complete"/>
                                        <s>{{ task.task }}</s>
                                    </li>
                                    {% endfor %}
                                </ul>
                            </div>
                            <div class="tab-pane fade" id="ex1-tabs-2" role="tabpanel" aria-labelledby="ex1-tab-2">
                                <ul class="list-group mb-0">
                                    <li class="list-group-item d-flex align-items-center border-0 mb-2 rounded"
                                        style="background-color: #f4f6f7;">
                                        <input class="form-check-input me-2" type="checkbox" value="" aria-label="..."/>
                                        Morbi leo risus
                                    </li>
                                    <li class="list-group-item d-flex align-items-center border-0 mb-2 rounded"
                                        style="background-color: #f4f6f7;">
                                        <input class="form-check-input me-2" type="checkbox" value="" aria-label="..."/>
                                        Porta ac consectetur ac
                                    </li>
                                    <li class="list-group-item d-flex align-items-center border-0 mb-0 rounded"
                                        style="background-color: #f4f6f7;">
                                        <input class="form-check-input me-2" type="checkbox" value="" aria-label="..."/>
                                        Vestibulum at eros
                                    </li>
                                </ul>
                            </div>
                            <div class="tab-pane fade" id="ex1-tabs-3" role="tabpanel" aria-labelledby="ex1-tab-3">
                                <ul class="list-group mb-0">
                                    <li class="list-group-item d-flex align-items-center border-0 mb-2 rounded"
                                        style="background-color: #f4f6f7;">
                                        <input class="form-check-input me-2" type="checkbox" value="" aria-label="..."
                                               checked/>
                                        <s>Cras justo odio</s>
                                    </li>
                                    <li class="list-group-item d-flex align-items-center border-0 mb-2 rounded"
                                        style="background-color: #f4f6f7;">
                                        <input class="form-check-input me-2" type="checkbox" value="" aria-label="..."
                                               checked/>
                                        <s>Dapibus ac facilisis in</s>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <!-- Tabs content -->

                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="site-footer my-2">
        <p>Built with Python, Flask, & SQLAlchemy by <span>Ghaleb Khadra</span> &middot; {{ current_year }}</p>
    </footer>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>
</html>
